body:
  text: 總訣血證成癆最難治十藥神書傳葛氏其中次第共十方從頭說與君家記假如嘔血吐血或嗽血先服十灰散揭截若還不止花蕊散即血如噴亦能歇血止之後人必虛大劑獨參湯補諸令其熟睡聽其醒病根逐漸好刪除遂與保和保真相間餌二湯藥味有加使清金潤燥保和良補肺扶羸保真美更須吞嚼太平丸此藥能令肺竅寬但是咽乾並咳嗽薄荷湯化服之安假如熱痰壅嗽甚沉香消化丸兼進依前仍嚼太平丸二藥相攻功益迅解嗽可煮潤肺膏復其元氣固根本白鳳膏專補肺癆培土生金法最捷若夫補髓丹又名十珍丸此則病愈之後收功藥逐一條陳要熟諳十方各自編歌括用法須從總訣參甲字十灰散主治治嘔血吐血咯血嗽血宜先用此藥止之藥物組成大薊小薊荷葉扁柏葉茅根茜根山梔大黃牡丹皮棕櫚皮各等分上藥各燒灰存性研極細末用紙包碗蓋於地上一夕出火毒用法用時先將白藕搗汁或蘿蔔汁磨京墨半碗調服五錢食後服下如病勢輕用此立止如血出成升斗者用花蕊石散止之歌訣十灰散茜草白茅根側柏棕荷二薊存梔子丹皮大黃等燒灰藕墨汁調吞寒能止血灰能澀大抵血得熱則行得寒則凝見黑則伏又灰性澀澀可固脫此自然之理也此藥可推吐血尊乙字花蕊石散主治治五藏崩損湧噴血出成升斗者用此止之藥物組成花蕊石火煅存性研為末用法用童便一杯燉溫調末三錢甚者五錢食後服下男子用酒一半女子用醋一半與童便和藥服使瘀血化為黃水後以獨參湯補之歌訣花蕊石散一味超李時珍曰此藥舊無氣味今嘗其氣平味澀而酸厥陰經血分藥也功專止血能使血化為水酸以收之也療婦人惡血血暈下死胎落胞衣去惡血血去而胞胎自下也煅研重便燉溫調花蕊石色如硫黃黃石中間有白點者故名凡入丸散須用罐封固濟火煅過研細末飛用之婦人和醋男和酒服下三錢瘀頓消程瘦樵曰治吐血者競推葛可久而先生首以二方止血明明劫劑毫無顧慮及細玩之始知先生制方之意入理之精也人生於陽根於陰陰氣虧則陽氣勝上氣為之喘促咳嗽涎沫發熱面紅無不相因而至故留得一分自家之血即得減一分上升之火此所以急於止血之大旨也丙字獨參湯主治血止後即以此湯補之藥物組成大人參二兩去蘆棗五枚用法每服水二盞煎一盞徐呷之服後熟睡一覺後進諸藥除根歌訣獨參湯獨用人參大棗五枚流水烹千金方云煎人參湯須用長流水若止水即不驗血止體虛精神怯陽生陰長此方珍自注云熟睡一覺使神安氣和則煩除而自靜蓋人之精由靜而生亦由靜而復也奈何今之醫者遇吐血症乃視參如砒毒耶不知有形之血不能即復而幾微之氣所當急固乎頓服獨參湯不但血脫可補且有陽生陰長之理存焉前方雖有止血之功而無補益之力故以此方繼之凡失血後精氣怯弱神思散亂者當遵此法治之丁字保和湯主治治久嗽肺燥成痿藥物組成知母貝母天門冬款冬花各三錢天花粉薏苡仁杏仁五味子各二錢甘草兜鈴紫菀百合桔梗阿膠當歸地黃紫蘇薄荷百部各錢半用法上以水二盞生薑三片煎一盞入飴糖一匙調服日三食後各進一盅與保真湯相間服血盛加炒蒲黃茜根藕節大薊小薊茅花當歸痰盛加南星半夏陳皮茯苓枳殼枳實喘甚加桑自皮陳皮蘿蔔子葶藶子蘇子熱甚加山梔子黃連黃芩黃柏連翹大黃款冬花風盛加荊芥防風菊花細辛香附子旋覆花寒盛加人參桂枝蠟片芍藥歌訣保和湯知貝款冬苡花粉甘桔兜杏味紫蘇紫菀薄荷歸百合百部阿膠地加姜三片飴一匙久嗽肺痿煎服此此與保真相間服臨證隨宜加味餌血痰喘熱及風寒六般加味分頭治血盛蒲黃茜草歸藕節二薊茅花配痰甚星夏茯陳枳喘甚桑皮葶藶子熱甚四黃翹款梔寒盛人參芍藥桂風盛荊防旋覆花甘菊細辛香附使戌字保真湯主治治虛弱骨蒸藥物組成當歸生地黃白朮黃耆人參各三錢赤茯苓陳皮赤芍藥甘草白茯苓厚朴各一錢五分天冬麥冬白芍藥知母黃柏五味子柴胡地骨皮熟地黃各一錢姜三片棗子五枚用法水二盞煎服與保和湯間服每日一服驚悸加茯神遠志柏子仁酸棗仁淋濁加萆薢烏藥豬苓澤瀉便澀加石葦扁蓄木通赤苓遺精加龍骨牡蠣蓮心蓮鬚燥熱加石膏滑石鱉甲青蒿盜汗加浮小麥牡蠣黃耆麻黃根歌訣保真湯二地參耆朮陳朴歸甘知柏柴二苓二冬並二芍骨皮五味棗姜加假如驚悸加酸棗淋濁豬苓萆薢偕便澀木通萹蓄草遺精蓮蕊蠣龍佳若然燥熱蒿膏鱉盜汗麻根浮麥誇此劑甘溫佐甘苦骨蒸勞熱保無差按前保和湯因失血之後氣血未調率難把握故大旨以瀉肺中伏熱益下焦之化源為治此保真湯則氣血之味俱等大旨以甘溫為主甘涼佐之而苦寒又佐之大補其正兼瀉其邪前方止咳寧肺此方補虛退熱各有所長然曰相間服之當視其嗽之輕重虛之微甚相其病勢之孰緩孰急而為之治二方加法大備然非盡用亦姑列之以俟去取耳己字太平丸主治治久嗽肺痿肺癰藥物組成天門冬麥門冬知母貝母款冬花各二兩杏仁當歸熟地生地黃連阿膠各一兩五錢蒲黃京墨桔梗薄荷各一兩白蜜四兩麝香少許為細末和勻用銀石器先下白蜜煉熟後下諸藥末搗勻再上火入麝香略熬三二沸丸如彈子大用法每日三丸食後細嚼一丸薄荷煎湯緩緩化下臨臥時如痰盛先用飴糖拌消化丸吞下卻噙嚼此丸仰臥使藥流入肺竅則肺清潤其嗽退除服七日病痊凡咳嗽只服此藥立愈歌訣太平丸二地二冬兼知貝連膠桔杏參京墨蒲黃歸薄款麝香少許蜜為丸失血之餘久咳嗽肺家癰痿效皆堪按太平丸非正方也因失血之餘服前保和保真二方正氣漸復嗽猶未止恐肺絡中尚留一分未盡之餘熱特於晏息之時噙服此丸使人於靜中不知其所以然而藥力無不到此少許麝香之所以神妙耳庚字沉香消化丸主治治熱咳痰壅藥物組成青礞石明礬飛研細豬牙皂角生南星生半夏白茯苓陳皮各二兩枳殼枳實各一兩五錢黃芩薄荷各一兩沉香五錢為細末和勻薑汁浸神麯糊丸梧桐子大用法每服一百丸虛人五六十丸每夜臨臥飴糖拌吞若非熱痰壅盛者不可輕服此丸歌訣沉香消化丸礞皂明礬星半生研要陳苓二枳薄荷芩薑汁神麯糊丸好臨臥飴糖拌服之熱痰壅嗽斯方妙辛字潤肺膏主治治久嗽肺燥肺痿藥物組成羊肺一具杏仁淨研柿霜真酥真粉各一兩白蜜二兩先將羊肺洗淨次將五味入水攪黏灌入肺中白水煮燒用法如常服食歌訣潤肺膏中用柿霜杏仁真粉蜜酥將五藥灌於羊肺內煮熟如常服食良壬字白鳳膏主治治一切虛勞咳嗽吐痰咯血發熱藥物組成烏嘴白鴨一隻大京棗二升參苓平胃散一升陳煮酒一瓶製法用法上將鴨縛定腳量患人飲酒多少隨量以酒燙溫將鴨項割開滴血入酒攪勻飲之直入肺經潤補其肺卻將鴨乾淨去毛於脅邊開一孔取去腸雜拭乾次將棗子去核每個中實納參苓平胃散末填滿鴨肚中用麻扎定以砂瓶一個置鴨在內四圍用火慢煨將陳煮酒作三次添入煮乾為度然後食棗子陰乾隨意用參湯送下後服補髓丹則補髓生精和血順氣歌訣白鳳膏醫勞嗽劑平常服餌乃奇異其藥參苓平胃散參苓平胃散即局方平胃散加人參茯苓益以陳京棗而已其法取用白鴨血溫酒攪和先飲耳卻將藥末納棗中以棗填實鴨腹裡慢火圍煨陳酒煮熟爛先將鴨肉餌棗子陰乾隨意食生津補肺功無比癸字補髓丹主治治勞嗽虛憊藥物組成豬脊膂一條羊脊膂一條團魚一枚烏骨雞一隻四味制淨去骨存肉用酒一大碗於砂瓶內煮熟擂細再用後藥大山藥五條蓮肉半斤京棗一百枚柿霜十個四味修制淨用井花水一大碗於砂甕內煮熟擂細與前熟肉一處用慢火熬之卻下明膠四兩黃蠟三兩上二味逐漸下與前味和一處研成膏子和平胃散末四君子湯末並知母黃柏末各一兩共一十兩搜和成劑如十分堅硬入白蜜同燉取起放青石上用水捶打成泥丸如梧桐子大用法每服一百丸不拘時候棗湯下勞病服之最為合度歌訣補髓丹用烏骨雞團魚豬脊羊脊膂酒煮熟爛搗如泥再用薯蕷蓮棗柿煨熟擂細同上藥復置罐中慢火煮更入黃臘與明膠和前八味熬膏子四君平胃知柏末共成十兩搜和劑如嫌堅硬加蜜丸久虛勞極服之起
